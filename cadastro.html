<!DOCTYPE html>
<html lang="pt-br">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR Motors | Sua Liberdade em Duas Rodas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
    :root { --dark-red: #7f0000; }
.bg-dark-red { background-color: var(--dark-red); }
</style>
    
<!-- No seu <form> ou seção de cadastro -->
<section class="bg-white p-6 rounded-xl shadow-lg max-w-md mx-auto my-10">
    <h2 class="text-2xl font-black uppercase text-dark-red mb-6">Cadastro de Reserva</h2>
    <form id="form-cadastro" class="space-y-4">
        <input type="text" id="nome" placeholder="Nome" class="w-full p-3 border rounded" required>
        <input type="text" id="sobrenome" placeholder="Sobrenome" class="w-full p-3 border rounded" required>
        <input type="email" id="email" placeholder="E-mail" class="w-full p-3 border rounded" required>
        <input type="tel" id="whatsapp" placeholder="WhatsApp (71) 99999-9999" class="w-full p-3 border rounded" required>
<button type="submit" 
        class="w-full bg-dark-red text-white font-bold py-3 rounded uppercase transition-transform transform hover:scale-105 active:scale-95 shadow-lg">
    Entrar na Lista
</button>
    </form>
</section>

<script>

     const firebaseConfig = {
            apiKey: "AIzaSyD3IPrt3xVPUE3S1dImKsAV5MiP-8OhcBE",
            authDomain: "teste-gm-c3955.firebaseapp.com",
            databaseURL: "https://teste-gm-c3955-default-rtdb.firebaseio.com",
            projectId: "teste-gm-c3955",
            storageBucket: "teste-gm-c3955.firebasestorage.app",
            messagingSenderId: "701174174796",
            appId: "1:701174174796:web:2ad4422822491e79db50e9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    
    // Use a mesma config do Firebase que você já tem
    document.getElementById('form-cadastro').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const novoCliente = {
            nome: document.getElementById('nome').value,
            sobrenome: document.getElementById('sobrenome').value,
            email: document.getElementById('email').value,
            whatsapp: document.getElementById('whatsapp').value,
            dataCadastro: new Date().toLocaleDateString('pt-BR'),
            timestamp: Date.now() // Necessário para a ordenação
        };

        firebase.database().ref('espera').push(novoCliente)
            .then(() => {
                alert('Cadastro realizado com sucesso!');
                e.target.reset();
            });
    });
</script>
</html>

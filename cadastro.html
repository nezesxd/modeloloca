<!DOCTYPE html>
<html lang="pt-br">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR Motors | Sua Liberdade em Duas Rodas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>

    body {
        /* Substitua pelo caminho da sua imagem */
        background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('wallpaperFRL.webp');
        
        /* Mantém a imagem fixa enquanto rola a página */
        background-attachment: fixed;
        
        /* Centraliza e faz a imagem cobrir toda a tela */
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        
        /* Garante que o fundo ocupe toda a altura da tela */
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

section {
        backdrop-filter: blur(5px); /* Efeito de vidro opcional */
    }
    
    :root { --dark-red: #7f0000; }
.bg-dark-red { background-color: var(--dark-red); }



.btn-hover-zoom {
    transition: transform 0.3s ease; /* Suaviza a animação */
  }

  .btn-hover-zoom:hover {
    transform: scale(1.1); /* Aumenta o tamanho em 10% */
  }

  h1{
      text-color: #ffffff;
  }  
</style>
    
<!-- No seu <form> ou seção de cadastro -->
<section class="border border-danger-subtle p-6 rounded-xl shadow-lg max-w-md mx-auto my-10">
    
    <h1 class="uppercase mb-6 text-center">Lista de Espera</h1>
    <form id="form-cadastro" class="space-y-4">
        <input type="text" id="nome" placeholder="Nome" class="w-full p-3 border rounded" required>
        <input type="text" id="sobrenome" placeholder="Sobrenome" class="w-full p-3 border rounded" required>
        <input type="email" id="email" placeholder="E-mail" class="w-full p-3 border rounded" required>
        <input type="tel" id="whatsapp" placeholder="WhatsApp (71) 99999-9999" class="w-full p-3 border rounded" required>
        <button onclick="salvarNaListaEspera()" class="bg-dark-red text-white p-3 rounded w-full btn-hover-zoom">
    Me avisar quando estiver disponível!
</button>
    </form>
</section>

<script>

     const firebaseConfig = {
            apiKey: "AIzaSyD3IPrt3xVPUE3S1dImKsAV5MiP-8OhcBE",
            authDomain: "teste-gm-c3955.firebaseapp.com",
            databaseURL: "https://teste-gm-c3955-default-rtdb.firebaseio.com",
            projectId: "teste-gm-c3955",
            storageBucket: "teste-gm-c3955.firebasestorage.app",
            messagingSenderId: "701174174796",
            appId: "1:701174174796:web:2ad4422822491e79db50e9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    
    async function salvarNaListaEspera() {
    // 1. Captura os dados exatamente como estão no seu formulário
    const nome = document.getElementById('nome').value;
    const sobrenome = document.getElementById('sobrenome').value;
    const email = document.getElementById('email').value;
    const whatsapp = document.getElementById('whatsapp').value;
    
    // 2. O LINK DO SEU WEBHOOK (Cole o link do Make entre as aspas)
    const webhookURL = "https://hook.us2.make.com/25ugqu3codgkqdvu9ypkakknn9p8dqwu"; 

    // Validação básica
    if (!nome || !whatsapp || !email) {
        alert("Por favor, preencha todos os campos obrigatórios.");
        return;
    }

    // 3. Organiza o objeto com todas as informações
    const dados = {
        cliente: `${nome} ${sobrenome}`, // Junta nome e sobrenome
        email: email,
        whatsapp: whatsapp,
        moto: typeof motoSelecionada !== 'undefined' ? motoSelecionada : "Não especificada",
        data: new Date().toLocaleString('pt-BR'),
        origem: "Cadastro de Reserva FR Motors"
    };

    try {
        // 4. Envia para o Make (Notificação automática no seu celular)
        // Usamos o modo 'no-cors' ou apenas fetch simples para garantir o envio
        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        // 5. Salva no Firebase (Seu banco de dados oficial)
        if (typeof firebase !== 'undefined') {
            firebase.database().ref('lista_reserva').push(dados);
        }

        // 6. Feedback para o usuário
        alert(`Obrigado, ${nome}! Cadastro realizado. Avisaremos você assim que a moto estiver disponível.`);
        
        // Limpa o formulário
        document.getElementById('form-cadastro').reset();

    } catch (error) {
        console.error("Erro ao processar reserva:", error);
        alert("Houve um erro, mas tentaremos processar sua reserva manualmente.");
    }
}

// Impede o formulário de recarregar a página ao clicar no botão
document.getElementById('form-cadastro').addEventListener('submit', function(e) {
    e.preventDefault();
    salvarNaListaEspera();
});
</script>
</html>

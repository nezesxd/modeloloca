<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR Motors | Sua Liberdade em Duas Rodas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('wallpaperFRL.webp');
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        /* Efeito Neon na Section */
        .card-cadastro {
            background-color: rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
            
            /* Borda Neon Vermelha/Laranja conforme a foto */
            border: 3px solid #ff3a00;
            box-shadow: 0 0 15px #7f0000, 
                        inset 0 0 10px #7f0000,
                        0 0 30px rgba(255, 58, 0, 0.3);
            animation: pulse-neon 2s infinite alternate;
        }

        /* Desfoque intenso ao passar o mouse */
        .card-cadastro:hover {
            backdrop-filter: blur(20px);
            box-shadow: 0 0 25px #ff3a00, 
                        inset 0 0 15px #ff3a00;
            transform: translateY(-5px);
        }

        /* Animação para a borda brilhar */
        @keyframes pulse-neon {
            from { box-shadow: 0 0 15px #7f0000, inset 0 0 5px #7f0000; }
            to { box-shadow: 0 0 30px #ff3a00, inset 0 0 15px #7f0000; }
        }
        
        :root { --dark-red: #7f0000; }
        .bg-dark-red { background-color: var(--dark-red); }

        /* Estilização dos Inputs conforme a imagem (mais escuros e elegantes) */
        input {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            transition: all 0.3s ease;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.6); }

        input:focus {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border-color: #ff3a00 !important;
            box-shadow: 0 0 10px rgba(255, 58, 0, 0.5);
            outline: none;
        }

        .btn-hover-zoom {
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .btn-hover-zoom:hover {
            transform: scale(1.03);
            background-color: #ff3a00 !important;
            box-shadow: 0 0 20px #ff3a00;
        }
    </style>
</head>

<body>
    <section class="card-cadastro p-10 rounded-[30px] max-w-lg mx-auto my-10">
        <h2 class="text-3xl font-black uppercase text-white mb-8 text-center tracking-[0.2em]">
            Cadastro de Reserva
        </h2>
        
        <form id="form-cadastro" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="nome" placeholder="Nome" class="w-full p-4 rounded-xl" required>
                <input type="text" id="sobrenome" placeholder="Sobrenome" class="w-full p-4 rounded-xl" required>
            </div>
            
            <input type="email" id="email" placeholder="E-mail" class="w-full p-4 rounded-xl" required>
            
            <input type="tel" id="whatsapp" placeholder="WhatsApp (71) 99999-9999" class="w-full p-4 rounded-xl" required>
            <input type="tel" id="motoSelecionada" placeholder="Modelo da moto" class="w-full p-4 rounded-xl" required>
            
            <button type="submit" class="bg-dark-red text-white p-5 rounded-xl w-full btn-hover-zoom font-black uppercase tracking-wider text-sm mt-4">
                Me avisar quando estiver disponível!
            </button>
        </form>
    </section>
<script>

     const firebaseConfig = {
            apiKey: "AIzaSyD3IPrt3xVPUE3S1dImKsAV5MiP-8OhcBE",
            authDomain: "teste-gm-c3955.firebaseapp.com",
            databaseURL: "https://teste-gm-c3955-default-rtdb.firebaseio.com",
            projectId: "teste-gm-c3955",
            storageBucket: "teste-gm-c3955.firebasestorage.app",
            messagingSenderId: "701174174796",
            appId: "1:701174174796:web:2ad4422822491e79db50e9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    
    async function salvarNaListaEspera() {
    // 1. Captura os dados exatamente como estão no seu formulário
    const nome = document.getElementById('nome').value;
    const sobrenome = document.getElementById('sobrenome').value;
    const email = document.getElementById('email').value;
    const whatsapp = document.getElementById('whatsapp').value;
    const whatsapp = document.getElementById('motoSelecionada').value;
    
    // 2. O LINK DO SEU WEBHOOK (Cole o link do Make entre as aspas)
    const webhookURL = "https://hook.us2.make.com/25ugqu3codgkqdvu9ypkakknn9p8dqwu"; 

    // Validação básica
    if (!nome || !whatsapp || !email) {
        alert("Por favor, preencha todos os campos obrigatórios.");
        return;
    }

    // 3. Organiza o objeto com todas as informações
    const dados = {
        cliente: `${nome} ${sobrenome}`, // Junta nome e sobrenome
        email: email,
        whatsapp: whatsapp,
        moto: typeof motoSelecionada !== 'undefined' ? motoSelecionada : "Não especificada",
        data: new Date().toLocaleString('pt-BR'),
        origem: "Cadastro de Reserva FR Motors"
    };

    try {
        // 4. Envia para o Make (Notificação automática no seu celular)
        // Usamos o modo 'no-cors' ou apenas fetch simples para garantir o envio
        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        // 5. Salva no Firebase (Seu banco de dados oficial)
        if (typeof firebase !== 'undefined') {
            firebase.database().ref('lista_reserva').push(dados);
        }

        // 6. Feedback para o usuário
        alert(`Obrigado, ${nome}! Cadastro realizado. Avisaremos você assim que a moto estiver disponível.`);
        
        // Limpa o formulário
        document.getElementById('form-cadastro').reset();

    } catch (error) {
        console.error("Erro ao processar reserva:", error);
        alert("Houve um erro, mas tentaremos processar sua reserva manualmente.");
    }
}

// Impede o formulário de recarregar a página ao clicar no botão
document.getElementById('form-cadastro').addEventListener('submit', function(e) {
    e.preventDefault();
    salvarNaListaEspera();
});
</script>
</html>

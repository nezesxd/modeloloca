<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Galo Motos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    
    <!-- Tela de Login -->
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-gray-800 p-8 rounded-2xl shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-red-600 italic tracking-tighter">GALO MOTOS</h2>
            <p class="text-gray-400 text-xs uppercase mt-2 font-bold">Acesso Restrito</p>
        </div>
        
        <input type="password" id="pass" placeholder="Senha de Acesso" 
               class="w-full p-4 rounded-xl bg-gray-700 mb-4 outline-none border-2 border-transparent focus:border-red-600 transition-all text-center">
        
        <button onclick="login()" 
                class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-bold uppercase transition-colors shadow-lg shadow-red-900/20">
            Entrar no Painel
        </button>
    </div>

    <!-- Tela do Dashboard (Escondida inicialmente) -->
    <div id="dash-screen" class="hidden max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-red-600 uppercase italic">Gestão de Frota</h1>
                <p class="text-gray-400 text-sm">Cadastre e gerencie as motos do seu site</p>
            </div>
            <button onclick="location.reload()" class="bg-gray-800 hover:bg-gray-700 px-6 py-2 rounded-full font-bold text-sm transition border border-gray-700">Sair</button>
        </div>

        <div class="grid lg:grid-cols-2 gap-12">
            <!-- Coluna 1: Formulário -->
            <div class="bg-gray-800 p-8 rounded-3xl shadow-xl border border-gray-700">
                <h3 id="form-title" class="font-bold mb-6 uppercase text-red-500 tracking-widest text-sm">Novo Cadastro</h3>
                <div class="space-y-5">
                    <div class="space-y-1">
                        <label class="text-[10px] uppercase font-black text-gray-500 ml-1">Foto da Moto</label>
                        <input type="file" id="m-img" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-red-600 file:text-white hover:file:bg-red-700 cursor-pointer">
                    </div>

                    <input type="text" id="m-nome" placeholder="Nome (Ex: Honda CG 160)" class="w-full p-3 bg-gray-700 rounded-lg outline-none focus:ring-2 ring-red-600">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="m-ano" placeholder="Ano (Ex: 2024)" class="w-full p-3 bg-gray-700 rounded-lg outline-none focus:ring-2 ring-red-600">
                        <input type="text" id="m-modelo" placeholder="Modelo (Ex: Start)" class="w-full p-3 bg-gray-700 rounded-lg outline-none focus:ring-2 ring-red-600">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="m-semanal" placeholder="Semanal (R$)" class="w-full p-3 bg-gray-700 rounded-lg outline-none focus:ring-2 ring-red-600">
                        <input type="number" id="m-caucao" placeholder="Caução (R$)" class="w-full p-3 bg-gray-700 rounded-lg outline-none focus:ring-2 ring-red-600">
                    </div>

                    <select id="m-status" class="w-full p-3 bg-gray-700 rounded-lg outline-none focus:ring-2 ring-red-600 cursor-pointer">
                        <option value="disponivel">Disponível</option>
                        <option value="indisponivel">Indisponível</option>
                    </select>

                    <button onclick="salvar()" id="btn-save" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-xl font-bold uppercase transition shadow-lg shadow-green-900/20">Salvar Moto</button>
                    <button onclick="cancelar()" id="btn-cancel" class="hidden w-full text-gray-400 text-xs font-bold uppercase hover:text-white transition">Cancelar Edição</button>
                </div>
            </div>

            <!-- Coluna 2: Lista de Motos -->
            <div class="space-y-4">
                <h3 class="font-bold mb-6 uppercase text-gray-500 tracking-widest text-sm">Frota Cadastrada</h3>
                <div id="admin-list" class="space-y-4">
                    <!-- Motos aparecerão aqui -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // LÓGICA DE ACESSO
        function login() {
            const pass = document.getElementById('pass').value;
            // Versão simplificada para garantir funcionamento no GitHub Pages
            if(pass === "galo") { 
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dash-screen').classList.remove('hidden');
                renderList();
            } else { 
                alert("Acesso Negado! Verifique a senha."); 
            }
        }

        // LÓGICA DE DADOS
        let motos = JSON.parse(localStorage.getItem('motos')) || [];
        let editId = null;

        function getBase64(file) {
            return new Promise((r, j) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => r(reader.result);
                reader.onerror = e => j(e);
            });
        }

        async function salvar() {
            const f = document.getElementById('m-img');
            const nome = document.getElementById('m-nome').value;
            
            if(!nome) return alert("Preecha pelo menos o nome da moto!");

            const moto = {
                id: editId || Date.now(),
                nome: nome,
                ano: document.getElementById('m-ano').value,
                modelo: document.getElementById('m-modelo').value,
                semanal: document.getElementById('m-semanal').value,
                caucao: document.getElementById('m-caucao').value,
                status: document.getElementById('m-status').value,
                img: editId ? motos.find(m => m.id === editId).img : "https://via.placeholder.com/400x300?text=Galo+Motos"
            };

            if(f.files[0]) {
                moto.img = await getBase64(f.files[0]);
            }
            
            if(editId) {
                const idx = motos.findIndex(m => m.id === editId);
                motos[idx] = moto;
            } else { 
                motos.push(moto); 
            }

            localStorage.setItem('motos', JSON.stringify(motos));
            alert("Sucesso!");
            location.reload();
        }

        function renderList() {
            const container = document.getElementById('admin-list');
            container.innerHTML = "";
            
            if(motos.length === 0) {
                container.innerHTML = '<p class="text-gray-600 italic">Nenhuma moto cadastrada.</p>';
                return;
            }

            motos.forEach(m => {
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-800 p-5 rounded-2xl border border-gray-700 hover:border-red-900 transition">
                        <div class="flex items-center gap-4">
                            <img src="${m.img}" class="w-12 h-12 rounded-lg object-cover shadow-lg">
                            <div>
                                <p class="font-bold text-sm uppercase">${m.nome}</p>
                                <p class="text-[10px] text-gray-500 font-bold uppercase">${m.status}</p>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="editar(${m.id})" class="text-blue-400 text-[10px] font-black uppercase hover:text-blue-300">Editar</button>
                            <button onclick="excluir(${m.id})" class="text-red-500 text-[10px] font-black uppercase hover:text-red-400">Excluir</button>
                        </div>
                    </div>`;
            });
        }

        function excluir(id) {
            if(confirm("Tem certeza que deseja remover esta moto da frota?")) {
                motos = motos.filter(m => m.id !== id);
                localStorage.setItem('motos', JSON.stringify(motos));
                renderList();
            }
        }

        function editar(id) {
            const m = motos.find(m => m.id === id);
            editId = id;
            document.getElementById('m-nome').value = m.nome;
            document.getElementById('m-ano').value = m.ano;
            document.getElementById('m-modelo').value = m.modelo;
            document.getElementById('m-semanal').value = m.semanal;
            document.getElementById('m-caucao').value = m.caucao;
            document.getElementById('m-status').value = m.status;
            
            document.getElementById('form-title').innerText = "Editando Moto";
            document.getElementById('btn-save').innerText = "Atualizar Dados";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function cancelar() {
            location.reload();
        }
    </script>
</body>
</html>

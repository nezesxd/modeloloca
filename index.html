    <style>
        :root { --dark-red: #7f0000; }
        .bg-dark-red { background-color: var(--dark-red); }

        .carousel-container { height: 350px; overflow: hidden; position: relative; background: #111; }
        .carousel-track { display: flex; transition: transform 0.8s ease-in-out; height: 100%; }
        .carousel-img { min-width: 100%; height: 100%; object-fit: cover; }

<body class="bg-gray-50 text-gray-900 relative">

        <div class="flex items-center gap-2">

    </header>

            <img src="card.png" class="carousel-img">
        </div>
    </div>

        <div id="moto-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

        </svg>

    <script>
        // CONFIGURAÇÃO DO FIREBASE (SUBSTITUA PELOS SEUS DADOS)
        const firebaseConfig = {
            apiKey: "AIzaSyD3IPrt3xVPUE3S1dImKsAV5MiP-8OhcBE",
            authDomain: "teste-gm-c3955.firebaseapp.com",
            databaseURL: "https://teste-gm-c3955-default-rtdb.firebaseio.com",
            projectId: "teste-gm-c3955",
            storageBucket: "teste-gm-c3955.firebasestorage.app",
            messagingSenderId: "701174174796",
            appId: "1:701174174796:web:2ad4422822491e79db50e9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function render() {
            const list = document.getElementById('moto-list');
            const track = document.getElementById('track');

            db.ref('motos').on('value', (snapshot) => {
                const motos = snapshot.val();
                list.innerHTML = "";
                // Mantém a foto fixa no carrossel
                track.innerHTML = `<img src="card.png" class="carousel-img">`;

                if (!motos) {
                    list.innerHTML = `<p class="text-center text-gray-400 col-span-full">Nenhuma moto disponível.</p>`;
                    return;
                }

                Object.keys(motos).forEach((key) => {
                    const moto = motos[key];
                    // Adiciona Card (agora exibindo o Caução)
                    list.innerHTML += `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden border">
                            <img src="${moto.img || 'https://via.placeholder.com/400x300'}" class="w-full h-48 object-cover">
                            <div class="p-5">
                                <h4 class="font-black text-xl text-dark-red">${moto.nome}</h4>
                                <p class="text-xs text-gray-400">${moto.modelo} | ${moto.ano}</p>
                                <div class="flex flex-col mt-4">
                                    <div class="flex justify-between items-center">
                                        <p class="text-2xl font-black italic">R$ ${moto.semanal}</p>
                                        <span class="px-2 py-1 rounded text-[10px] font-bold ${moto.status === 'disponivel' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                            ${moto.status.toUpperCase()}
                                        </span>
                                    </div>
                                    <p class="text-xs font-bold text-gray-500 mt-1 uppercase">Caução: R$ ${moto.caucao || '0'}</p>
                                </div>
                                <a href="https://wa.me/5571999999999" target="_blank" class="block text-center mt-4 bg-dark-red text-white py-3 rounded-lg font-bold">ALUGAR AGORA</a>
                            </div>
                        </div>`;
                    
                    // Adiciona ao Carrossel se houver imagem
                    if(moto.img) {
                        track.innerHTML += `<img src="${moto.img}" class="carousel-img">`;
                    }
                });
            });
        }

        // Intervalo do Carrossel
        let current = 0;
        setInterval(() => {
            const slides = document.querySelectorAll('.carousel-img');
            if(slides.length > 1) {
                current = (current + 1) % slides.length;
                document.getElementById('track').style.transform = `translateX(-${current * 100}%)`;
            }
        }, 4000);

        window.onload = render;
    </script>
</body>
</html>

<section id="banner-fr-motors" style="width: 100%; height: 450px; background-color: #000; overflow: hidden; position: relative; margin-bottom: 20px;">
    <div id="carousel-track" style="display: flex; height: 100%; width: 100%; transition: transform 0.7s ease-in-out;">
        <div style="color: white; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: sans-serif; font-weight: bold;">
            CARREGANDO BANNERS...
        </div>
    </div>
    
    <div id="carousel-indicators" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10;"></div>
</section>

<style>
    /* Estilos internos para garantir o funcionamento independente de classes externas */
    .carousel-item { 
        min-width: 100%; 
        height: 100%; 
        flex-shrink: 0; 
    }
    .carousel-item img { 
        width: 100% !important; 
        height: 100% !important; 
        object-fit: cover !important; 
    }
    .dot-banner { 
        width: 12px; 
        height: 12px; 
        border-radius: 50%; 
        background: rgba(255,255,255,0.4); 
        transition: all 0.3s ease;
        border: 1px solid rgba(0,0,0,0.2);
    }
    .dot-banner.active { 
        background: #e11d48; /* Cor destaque (Red) */
        transform: scale(1.3);
        box-shadow: 0 0 10px rgba(225, 29, 72, 0.5);
    }
</style>

<script>
/**
 * Lógica do Carrossel Dinâmico via Firebase e Google Drive
 */
function inicializarCarrosselFR() {
    const track = document.getElementById('carousel-track');
    const indicators = document.getElementById('carousel-indicators');

    // 1. Ouvir os dados do Firebase (Chave 'banners')
    firebase.database().ref('banners').on('value', (snapshot) => {
        const dadosBanners = snapshot.val();
        
        if (!dadosBanners) {
            console.log("Aviso: Nenhum banner encontrado no Firebase.");
            track.innerHTML = '<div class="carousel-item"><img src="card.png" style="width:100%; height:100%; object-fit:cover;"></div>';
            return;
        }

        let htmlSlides = "";
        let htmlDots = "";
        let totalBanners = 0;

        Object.keys(dadosBanners).forEach((key) => {
            const linkRaw = dadosBanners[key].url;
            let idDrive = "";

            // Conversor Robusto de Link do Google Drive
            try {
                if (linkRaw.includes("id=")) {
                    idDrive = linkRaw.split("id=")[1].split("&")[0];
                } else if (linkRaw.includes("/d/")) {
                    idDrive = linkRaw.split("/d/")[1].split("/")[0];
                }
            } catch (e) {
                console.error("Link inválido no banco:", linkRaw);
            }

            if (idDrive) {
                const urlImagemDireta = `https://drive.google.com/uc?export=view&id=${idDrive}`;

                htmlSlides += `
                    <div class="carousel-item">
                        <img src="${urlImagemDireta}" onerror="this.src='card.png'" alt="Banner FR Motors">
                    </div>`;
                
                htmlDots += `<div class="dot-banner ${totalBanners === 0 ? 'active' : ''}" id="ponto-banner-${totalBanners}"></div>`;
                totalBanners++;
            }
        });

        // Injetar no HTML
        track.innerHTML = htmlSlides;
        indicators.innerHTML = htmlDots;

        // 2. Iniciar animação automática se houver mais de um banner
        if (totalBanners > 1) {
            iniciarAnimacaoAutomatica(totalBanners);
        }
    });
}

function iniciarAnimacaoAutomatica(total) {
    let indexAtual = 0;
    const track = document.getElementById('carousel-track');
    
    // Limpa timers antigos para não bugar o carrossel
    if (window.timerGlobalBanner) clearInterval(window.timerGlobalBanner);

    window.timerGlobalBanner = setInterval(() => {
        indexAtual = (indexAtual + 1) % total;
        
        // Move o trilho
        track.style.transform = `translateX(-${indexAtual * 100}%)`;
        
        // Atualiza os indicadores (pontos)
        document.querySelectorAll('.dot-banner').forEach(d => d.classList.remove('active'));
        const dotAtivo = document.getElementById(`ponto-banner-${indexAtual}`);
        if (dotAtivo) dotAtivo.classList.add('active');
    }, 5000); // 5 segundos por slide
}

// Disparar a função após o carregamento da página
window.addEventListener('load', () => {
    // Timeout de segurança para o Firebase terminar de carregar
    setTimeout(() => {
        if (typeof firebase !== 'undefined') {
            inicializarCarrosselFR();
        } else {
            console.error("Erro: Firebase não foi carregado corretamente.");
        }
    }, 1200);
});
</script>

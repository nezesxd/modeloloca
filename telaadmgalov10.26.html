<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel FR Motors 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        :root { --dark-red: #7f0000; }
        .bg-dark-red { background-color: var(--dark-red); }
</style>

</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Container Principal Responsivo -->
    <div class="max-w-4xl mx-auto px-4 py-6 md:py-12">
        
        <!-- Header -->
        <div class="flex items-center gap-3 mb-8 justify-center md:justify-start">
            <div class="bg-red-800 text-white font-black p-2 rounded text-xl">FR</div>
            <h2 id="form-title" class="text-2xl md:text-3xl font-black text-red-800 uppercase tracking-tighter">Gerenciar Frota</h2>
        </div>

        <!-- Formulário Card -->
        <div class="bg-white p-5 md:p-8 rounded-2xl shadow-xl border border-gray-200">
            <input type="hidden" id="m-id">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                <!-- Imagem (Ocupa 2 colunas no desktop) -->
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Link da Imagem (Google Drive ou URL)</label>
                    <input type="text" id="m-img" placeholder="https://..." class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition">
                </div>

                <!-- Nome -->
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nome da Moto</label>
                    <input type="text" id="m-nome" placeholder="Ex: Honda CG 160 Titan" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition">
                </div>

                <!-- Ano e Modelo -->
                <div class="grid grid-cols-2 gap-4 md:col-span-2">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Ano</label>
                        <input type="text" id="m-ano" placeholder="2024" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Modelo</label>
                        <input type="text" id="m-modelo" placeholder="EX / Fan" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition">
                    </div>
                </div>

                <!-- Valores -->
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Semanal (R$)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-4 text-gray-400 font-bold">R$</span>
                        <input type="number" id="m-semanal" placeholder="0.00" class="w-full mt-1 p-3 pl-10 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Caução (R$)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-4 text-gray-400 font-bold">R$</span>
                        <input type="number" id="m-caucao" placeholder="0.00" class="w-full mt-1 p-3 pl-10 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition">
                    </div>
                </div>

                <!-- Status -->
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Disponibilidade</label>
                    <select id="m-status" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition font-bold text-gray-700">
                        <option value="disponivel">✅ DISPONÍVEL</option>
                        <option value="indisponivel">🚫 INDISPONÍVEL</option>
                    </select>
                </div>
            </div>

            <!-- Botões de Ação -->
            <div class="flex flex-col sm:flex-row gap-3 mt-8">
                <button id="btn-save" onclick="saveMoto()" class="flex-1 bg-red-800 text-white py-4 rounded-xl font-bold uppercase hover:bg-red-900 transition-all shadow-lg active:scale-95">
                    Salvar
                </button>
                <button id="btn-cancel" onclick="clearForm()" class="hidden sm:inline-block bg-gray-200 text-gray-600 px-8 py-4 rounded-xl font-bold uppercase hover:bg-gray-300 transition">
                    Cancelar
                </button>
                <!-- Botão cancelar especial para mobile quando editando -->
                <button id="btn-cancel-mobile" onclick="clearForm()" class="hidden sm:hidden bg-gray-200 text-gray-600 py-3 rounded-xl font-bold uppercase">
                    Cancelar Edição
                </button>
            </div>
        </div>

        <!-- Lista de Motos Cadastradas -->
        <div class="mt-12">
            <div class="flex justify-between items-end mb-6">
                <h3 class="text-xl font-black text-gray-800 uppercase tracking-tight">Frota Atual</h3>
                <span class="text-xs font-bold text-gray-400 uppercase">Ações em tempo real</span>
            </div>
            
            <div id="admin-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Cards carregados via Firebase -->
            </div>
        </div>
    </div>





<!-- Seção de Gerenciamento de Banners -->
<section class="bg-white p-6 rounded-xl shadow-lg mb-8 border border-gray-100">
    <h2 class="text-xl font-black text-dark-red uppercase mb-4 flex items-center gap-2">
        <span>🖼️</span> Gerenciar Banners (Carrossel)
    </h2>
    
    <div class="flex flex-col sm:flex-row gap-3">
        <input type="text" id="link-drive" placeholder="Cole o link do Google Drive aqui" 
               class="flex-grow p-3 border rounded-lg focus:ring-2 focus:ring-dark-red outline-none">
        <button onclick="salvarBanner()" 
                class="bg-dark-red text-white px-6 py-3 rounded-lg font-bold hover:bg-red-800 transition shadow-md">
            Adicionar Banner
        </button>
    </div>

    <!-- Lista de Banners Atuais -->
    <div id="lista-banners" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-6">
        <!-- Miniaturas dos banners aparecerão aqui -->
    </div>
</section>

<script>
    // Função para salvar o link no Firebase
function salvarBanner() {
    const urlInput = document.getElementById('link-drive');
    const url = urlInput.value.trim();

    if (!url) {
        alert("Por favor, cole um link!");
        return;
    }

    console.log("Tentando salvar no Firebase...");

    // Tenta salvar na chave 'banners'
    firebase.database().ref('banners').push({
        url: url
    })
    .then(() => {
        alert("Banner salvo com sucesso no Firebase!");
        urlInput.value = "";
    })
    .catch((error) => {
        console.error("Erro ao salvar:", error);
        alert("Erro de permissão no Firebase: " + error.message);
    });
}


    
    
    // Função para listar e excluir banners
    function listarBanners() {
        const container = document.getElementById('lista-banners');
        firebase.database().ref('banners').on('value', (snapshot) => {
            container.innerHTML = "";
            const banners = snapshot.val();
            if (!banners) return;

            Object.keys(banners).forEach((key) => {
                const url = banners[key].url;
                // Converte para miniatura
                const thumb = url.replace("file/d/", "uc?export=view&id=").replace("/view?usp=sharing", "");

                container.innerHTML += `
                    <div class="relative group border rounded-lg overflow-hidden h-24 bg-gray-100">
                        <img src="${thumb}" class="w-full h-full object-cover">
                        <button onclick="excluirBanner('${key}')" 
                                class="absolute top-1 right-1 bg-red-600 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                `;
            });
        });
    }

    function excluirBanner(key) {
        if(confirm("Deseja remover este banner?")) {
            firebase.database().ref('banners/' + key).remove();
        }
    }

    // Inicia a listagem ao carregar a página
    window.addEventListener('load', listarBanners);
</script>










    
    <script>
        // Configuração Firebase (Mantida a sua)
        const firebaseConfig = {
            apiKey: "AIzaSyD3IPrt3xVPUE3S1dImKsAV5MiP-8OhcBE",
            authDomain: "teste-gm-c3955.firebaseapp.com",
            databaseURL: "https://teste-gm-c3955-default-rtdb.firebaseio.com",
            projectId: "teste-gm-c3955",
            storageBucket: "teste-gm-c3955.firebasestorage.app",
            messagingSenderId: "701174174796",
            appId: "1:701174174796:web:2ad4422822491e79db50e9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function formatDriveLink(link) {
            if (link.includes('drive.google.com')) {
                let id = "";
                if (link.includes('id=')) {
                    id = link.split('id=')[1].split('&')[0];
                } else {
                    id = link.split('/d/')[1].split('/')[0];
                }
                return `https://lh3.googleusercontent.com/d/${id}`;
            }
            return link;
        }

        function saveMoto() {
            const id = document.getElementById('m-id').value;
            const motoData = {
                img: formatDriveLink(document.getElementById('m-img').value),
                nome: document.getElementById('m-nome').value,
                ano: document.getElementById('m-ano').value,
                modelo: document.getElementById('m-modelo').value,
                semanal: document.getElementById('m-semanal').value,
                caucao: document.getElementById('m-caucao').value,
                status: document.getElementById('m-status').value
            };

            if(!motoData.nome || !motoData.semanal) {
                alert("Por favor, preencha ao menos Nome e Valor Semanal.");
                return;
            }

            if (id) {
                db.ref('motos/' + id).update(motoData).then(() => {
                    alert("Dados atualizados com sucesso!");
                    clearForm();
                });
            } else {
                db.ref('motos').push(motoData).then(() => {
                    alert("Moto adicionada à frota!");
                    clearForm();
                });
            }
        }

        function loadAdmin() {
            db.ref('motos').on('value', (snapshot) => {
                const motos = snapshot.val();
                const list = document.getElementById('admin-list');
                list.innerHTML = "";
                
                if(motos) {
                    Object.keys(motos).forEach(key => {
                        const m = motos[key];
                        list.innerHTML += `
                            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between hover:shadow-md transition">
                                <div class="flex items-center gap-4 mb-4">
                                    <img src="${m.img || 'https://via.placeholder.com/80'}" class="w-16 h-16 object-cover rounded-lg bg-gray-100">
                                    <div class="overflow-hidden">
                                        <p class="font-black text-gray-800 uppercase truncate">${m.nome}</p>
                                        <p class="text-[10px] text-gray-400 font-bold uppercase">${m.modelo} • ${m.ano}</p>
                                        <p class="text-sm font-bold text-red-700">R$ ${m.semanal}/sem</p>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="editMoto('${key}')" class="bg-blue-50 text-blue-600 py-2 rounded-lg font-bold text-xs hover:bg-blue-100 transition">EDITAR</button>
                                    <button onclick="deleteMoto('${key}')" class="bg-gray-50 text-gray-400 py-2 rounded-lg font-bold text-xs hover:bg-red-50 hover:text-red-600 transition">EXCLUIR</button>
                                </div>
                            </div>`;
                    });
                } else {
                    list.innerHTML = `<p class="col-span-full text-center text-gray-400 py-10 font-medium">Nenhuma moto cadastrada.</p>`;
                }
            });
        }

        function editMoto(key) {
            db.ref('motos/' + key).once('value').then((snapshot) => {
                const m = snapshot.val();
                document.getElementById('m-id').value = key;
                document.getElementById('m-img').value = m.img;
                document.getElementById('m-nome').value = m.nome;
                document.getElementById('m-ano').value = m.ano;
                document.getElementById('m-modelo').value = m.modelo;
                document.getElementById('m-semanal').value = m.semanal;
                document.getElementById('m-caucao').value = m.caucao || "";
                document.getElementById('m-status').value = m.status;

                document.getElementById('form-title').innerText = "Editando Moto";
                document.getElementById('btn-save').innerText = "Confirmar Alteração";
                document.getElementById('btn-cancel').classList.remove('hidden');
                document.getElementById('btn-cancel-mobile').classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        function clearForm() {
            document.getElementById('m-id').value = "";
            document.getElementById('m-img').value = "";
            document.getElementById('m-nome').value = "";
            document.getElementById('m-ano').value = "";
            document.getElementById('m-modelo').value = "";
            document.getElementById('m-semanal').value = "";
            document.getElementById('m-caucao').value = "";
            document.getElementById('form-title').innerText = "Gerenciar Frota";
            document.getElementById('btn-save').innerText = "Salvar";
            document.getElementById('btn-cancel').classList.add('hidden');
            document.getElementById('btn-cancel-mobile').classList.add('hidden');
        }

        function deleteMoto(key) {
            if(confirm("Deseja realmente remover esta moto permanentemente?")) {
                db.ref('motos/' + key).remove();
            }
        }

        window.onload = loadAdmin;
    </script>
</body>
</html>

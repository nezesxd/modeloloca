<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel FR Motors 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            /* Wallpaper focado em detalhes mecânicos ou pista */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('wallpaperFRL.webp');
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

                .card-admin {
            background-color: rgba(0, 0, 0, 0.6) !important;
            backdrop-filter: blur(8px);
            border: 3px solid #ff3a00; /* Cor laranja/vermelha da foto */
            box-shadow: 0 0 15px #7f0000, 
                        inset 0 0 10px #7f0000,
                        0 0 30px rgba(255, 58, 0, 0.3);
            animation: pulse-neon 2s infinite alternate;
        }
        
        @keyframes pulse-neon {
            from { box-shadow: 0 0 15px #7f0000, inset 0 0 5px #7f0000; }
            to { box-shadow: 0 0 30px #ff3a00, inset 0 0 15px #7f0000; }
        }
        
        /* Inputs escuros para combinar com o tema */
        input, select, textarea {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
             
        :root { --dark-red: #7f0000; }
        .bg-dark-red { background-color: var(--dark-red); }
</style>

</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Container Principal Responsivo -->
    <div class="max-w-4xl mx-auto px-4 py-6 md:py-12">
        
        <!-- Header -->
        <div class="flex items-center gap-3 mb-8 justify-center">
    <div class="bg-red-800 text-white font-black p-2 rounded text-xl">FR</div>
    <h2 id="form-title" class="text-2xl md:text-3xl font-black text-white uppercase tracking-tighter">Gerenciar Frota</h2>
</div>

        <!-- Formulário Card -->
        <section class="card-admin p-6 md:p-10 rounded-[30px] shadow-2xl max-w-4xl mx-auto mb-12">
    <input type="hidden" id="m-id">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
        <div class="md:col-span-2">
            <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Link da Imagem</label>
            <input type="text" id="m-img" placeholder="https://..." class="w-full mt-1 p-4 rounded-xl outline-none transition">
        </div>

        <div class="md:col-span-2">
            <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Nome da Moto</label>
            <input type="text" id="m-nome" placeholder="Ex: Honda CG 160 Titan" class="w-full mt-1 p-4 rounded-xl outline-none transition">
        </div>

        <div class="grid grid-cols-2 gap-4 md:col-span-2">
            <div>
                <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Ano</label>
                <input type="text" id="m-ano" placeholder="2024" class="w-full mt-1 p-4 rounded-xl">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Modelo</label>
                <input type="text" id="m-modelo" placeholder="EX / Fan" class="w-full mt-1 p-4 rounded-xl">
            </div>
        </div>

        <div>
            <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Semanal (R$)</label>
            <input type="number" id="m-semanal" placeholder="R$ 0.00" class="w-full mt-1 p-4 rounded-xl">
        </div>
        <div>
            <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Caução (R$)</label>
            <input type="number" id="m-caucao" placeholder="R$ 0.00" class="w-full mt-1 p-4 rounded-xl">
        </div>

        <div class="md:col-span-2">
            <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Disponibilidade</label>
            <select id="m-status" class="w-full mt-1 p-4 rounded-xl font-bold">
                <option value="disponivel">✅ DISPONÍVEL</option>
                <option value="indisponivel">🚫 INDISPONÍVEL</option>
            </select>
        </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 mt-8">
        <button id="btn-save" onclick="saveMoto()" class="flex-1 bg-red-800 text-white py-4 rounded-xl font-bold uppercase hover:bg-red-900 transition-all shadow-lg active:scale-95">
            Salvar
        </button>
        <button id="btn-cancel" onclick="clearForm()" class="hidden sm:inline-block bg-white/10 text-white px-8 py-4 rounded-xl font-bold uppercase hover:bg-white/20 transition">
            Cancelar
        </button>
    </div>
</section>
        <!-- Lista de Motos Cadastradas -->
        <div class="mt-12">
            <div class="flex justify-between items-end mb-6">
                <h3 class="text-xl font-black text-gray-800 uppercase tracking-tight">Frota Atual</h3>
                <span class="text-xs font-bold text-gray-400 uppercase">Ações em tempo real</span>
            </div>
            
            <div id="admin-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Cards carregados via Firebase -->
            </div>
        </div>
    </div>
    
    <script>
        // Configuração Firebase (Mantida a sua)
        const firebaseConfig = {
            apiKey: "AIzaSyD3IPrt3xVPUE3S1dImKsAV5MiP-8OhcBE",
            authDomain: "teste-gm-c3955.firebaseapp.com",
            databaseURL: "https://teste-gm-c3955-default-rtdb.firebaseio.com",
            projectId: "teste-gm-c3955",
            storageBucket: "teste-gm-c3955.firebasestorage.app",
            messagingSenderId: "701174174796",
            appId: "1:701174174796:web:2ad4422822491e79db50e9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function formatDriveLink(link) {
            if (link.includes('drive.google.com')) {
                let id = "";
                if (link.includes('id=')) {
                    id = link.split('id=')[1].split('&')[0];
                } else {
                    id = link.split('/d/')[1].split('/')[0];
                }
                return `https://lh3.googleusercontent.com/d/${id}`;
            }
            return link;
        }

        function saveMoto() {
            const id = document.getElementById('m-id').value;
            const motoData = {
                img: formatDriveLink(document.getElementById('m-img').value),
                nome: document.getElementById('m-nome').value,
                ano: document.getElementById('m-ano').value,
                modelo: document.getElementById('m-modelo').value,
                semanal: document.getElementById('m-semanal').value,
                caucao: document.getElementById('m-caucao').value,
                status: document.getElementById('m-status').value
            };

            if(!motoData.nome || !motoData.semanal) {
                alert("Por favor, preencha ao menos Nome e Valor Semanal.");
                return;
            }

            if (id) {
                db.ref('motos/' + id).update(motoData).then(() => {
                    alert("Dados atualizados com sucesso!");
                    clearForm();
                });
            } else {
                db.ref('motos').push(motoData).then(() => {
                    alert("Moto adicionada à frota!");
                    clearForm();
                });
            }
        }

        function loadAdmin() {
            db.ref('motos').on('value', (snapshot) => {
                const motos = snapshot.val();
                const list = document.getElementById('admin-list');
                list.innerHTML = "";
                
                if(motos) {
                    Object.keys(motos).forEach(key => {
                        const m = motos[key];
                        list.innerHTML += `
                            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-between hover:shadow-md transition">
                                <div class="flex items-center gap-4 mb-4">
                                    <img src="${m.img || 'https://via.placeholder.com/80'}" class="w-16 h-16 object-cover rounded-lg bg-gray-100">
                                    <div class="overflow-hidden">
                                        <p class="font-black text-gray-800 uppercase truncate">${m.nome}</p>
                                        <p class="text-[10px] text-gray-400 font-bold uppercase">${m.modelo} • ${m.ano}</p>
                                        <p class="text-sm font-bold text-red-700">R$ ${m.semanal}/sem</p>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <button onclick="editMoto('${key}')" class="bg-blue-50 text-blue-600 py-2 rounded-lg font-bold text-xs hover:bg-blue-100 transition">EDITAR</button>
                                    <button onclick="deleteMoto('${key}')" class="bg-gray-50 text-gray-400 py-2 rounded-lg font-bold text-xs hover:bg-red-50 hover:text-red-600 transition">EXCLUIR</button>
                                </div>
                            </div>`;
                    });
                } else {
                    list.innerHTML = `<p class="col-span-full text-center text-gray-400 py-10 font-medium">Nenhuma moto cadastrada.</p>`;
                }
            });
        }

        function editMoto(key) {
            db.ref('motos/' + key).once('value').then((snapshot) => {
                const m = snapshot.val();
                document.getElementById('m-id').value = key;
                document.getElementById('m-img').value = m.img;
                document.getElementById('m-nome').value = m.nome;
                document.getElementById('m-ano').value = m.ano;
                document.getElementById('m-modelo').value = m.modelo;
                document.getElementById('m-semanal').value = m.semanal;
                document.getElementById('m-caucao').value = m.caucao || "";
                document.getElementById('m-status').value = m.status;

                document.getElementById('form-title').innerText = "Editando Moto";
                document.getElementById('btn-save').innerText = "Confirmar Alteração";
                document.getElementById('btn-cancel').classList.remove('hidden');
                document.getElementById('btn-cancel-mobile').classList.remove('hidden');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        function clearForm() {
            document.getElementById('m-id').value = "";
            document.getElementById('m-img').value = "";
            document.getElementById('m-nome').value = "";
            document.getElementById('m-ano').value = "";
            document.getElementById('m-modelo').value = "";
            document.getElementById('m-semanal').value = "";
            document.getElementById('m-caucao').value = "";
            document.getElementById('form-title').innerText = "Gerenciar Frota";
            document.getElementById('btn-save').innerText = "Salvar";
            document.getElementById('btn-cancel').classList.add('hidden');
            document.getElementById('btn-cancel-mobile').classList.add('hidden');
        }

        function deleteMoto(key) {
            if(confirm("Deseja realmente remover esta moto permanentemente?")) {
                db.ref('motos/' + key).remove();
            }
        }

        window.onload = loadAdmin;
    </script>
</body>
</html>
